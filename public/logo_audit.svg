<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <!-- Background -->
  <rect width="80" height="80" rx="18" fill="#1E3A5F"/>

  <!-- Document body -->
  <rect x="18" y="14" width="36" height="44" rx="4" fill="#2A5298" stroke="#4A90D9" stroke-width="1.5"/>

  <!-- Document lines -->
  <line x1="25" y1="26" x2="47" y2="26" stroke="#7EB8F7" stroke-width="2" stroke-linecap="round"/>
  <line x1="25" y1="33" x2="47" y2="33" stroke="#7EB8F7" stroke-width="2" stroke-linecap="round"/>
  <line x1="25" y1="40" x2="38" y2="40" stroke="#7EB8F7" stroke-width="2" stroke-linecap="round"/>

  <!-- Magnifying glass -->
  <circle cx="52" cy="52" r="11" fill="#1E3A5F" stroke="#4A90D9" stroke-width="2"/>
  <circle cx="52" cy="52" r="7" fill="none" stroke="#7EB8F7" stroke-width="2.5"/>
  <line x1="57" y1="57" x2="63" y2="63" stroke="#7EB8F7" stroke-width="3" stroke-linecap="round"/>

  <!-- Check mark on document -->
  <polyline points="28,47 31,51 38,44" stroke="#4ECDC4" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
