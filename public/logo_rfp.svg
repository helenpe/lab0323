<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <!-- Background -->
  <rect width="80" height="80" rx="18" fill="#2D1B69"/>

  <!-- Document body -->
  <rect x="16" y="12" width="34" height="46" rx="4" fill="#4C1D95" stroke="#7C3AED" stroke-width="1.5"/>

  <!-- Folded corner -->
  <path d="M40 12 L50 12 L50 22 Z" fill="#2D1B69"/>
  <path d="M40 12 L50 22 L40 22 Z" fill="#6D28D9" stroke="#7C3AED" stroke-width="1"/>

  <!-- Document lines (text) -->
  <line x1="23" y1="28" x2="43" y2="28" stroke="#C4B5FD" stroke-width="2" stroke-linecap="round"/>
  <line x1="23" y1="35" x2="43" y2="35" stroke="#C4B5FD" stroke-width="2" stroke-linecap="round"/>
  <line x1="23" y1="42" x2="35" y2="42" stroke="#C4B5FD" stroke-width="2" stroke-linecap="round"/>

  <!-- Pen / edit tool -->
  <g transform="translate(44, 46) rotate(-45)">
    <rect x="0" y="0" width="8" height="18" rx="2" fill="#A78BFA" stroke="#7C3AED" stroke-width="1"/>
    <polygon points="0,18 8,18 4,24" fill="#DDD6FE"/>
    <line x1="0" y1="5" x2="8" y2="5" stroke="#7C3AED" stroke-width="1"/>
  </g>

  <!-- Sparkle AI dot -->
  <circle cx="58" cy="22" r="4" fill="#F0ABFC" opacity="0.9"/>
  <line x1="58" y1="16" x2="58" y2="28" stroke="#F0ABFC" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="52" y1="22" x2="64" y2="22" stroke="#F0ABFC" stroke-width="1.5" stroke-linecap="round"/>
</svg>
